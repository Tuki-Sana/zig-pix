# ネイティブ libpict + FFI/E2E。WASM（zigpix-wasm）は build-wasm.yml（手動）を参照。
name: Build native binaries

on:
  push:
    branches:
      - main
      - "feat/**" # feature で push しただけでも CI（Windows 含む）を回す
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ── Linux x86_64 ─────────────────────────────────────────────────────────
  build-linux-x64:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Zig 0.13.0
        uses: mlugg/setup-zig@v1
        with:
          version: 0.13.0

      - name: Install build tools (cmake / nasm / ninja / g++)
        run: sudo apt-get install -y cmake nasm ninja-build g++

      - name: Build libavif (static) — libaom via FetchContent
        run: |
          mkdir -p build/libavif && cd build/libavif
          cmake ../../vendor/libavif -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=../../build/libavif-install \
            -DAVIF_CODEC_AOM=LOCAL \
            -DAVIF_CODEC_DAV1D=OFF \
            -DAVIF_BUILD_TESTS=OFF \
            -DAVIF_BUILD_APPS=OFF \
            -DAVIF_LIBYUV=OFF \
            -DBUILD_SHARED_LIBS=OFF
          ninja
          ninja install

      - name: Build libpict.so (static avif)
        run: zig build lib -Doptimize=ReleaseFast -Davif=static

      - name: Verify libavif/libaom not dynamically linked
        run: |
          echo "=== ldd output ===" && ldd zig-out/lib/libpict.so
          ! ldd zig-out/lib/libpict.so | grep -E "libavif|libaom"

      - name: Install Node.js deps
        run: npm install

      - name: Build JS wrapper (js/dist/)
        run: npm run build

      # optional がレジストリ未公開だと npm install でディレクトリが作られないため、
      # リポジトリの package.json を置いてから zig-out の lib で上書きする。
      - name: Overlay zig-out lib for tests (optional npm bins are stale until publish)
        run: |
          mkdir -p node_modules/zigpix-linux-x64
          cp npm/zigpix-linux-x64/package.json node_modules/zigpix-linux-x64/
          cp zig-out/lib/libpict.so node_modules/zigpix-linux-x64/libpict.so

      - name: Run FFI tests (Bun)
        uses: oven-sh/setup-bun@v2
        # Bun テストは別ステップで実行
      - run: bun run test/ffi/test.ts

      - name: Run FFI tests (Node.js / koffi)
        run: npx tsx test/ffi/test.node.ts

      - name: Install Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Run FFI tests (Deno)
        run: deno run --allow-read --allow-ffi --allow-env test/ffi/test.deno.ts

      - name: Run E2E tests (Node.js)
        run: npx tsx test/e2e/e2e.node.ts

      - name: Run E2E tests (Bun)
        run: bun run test/e2e/e2e.node.ts

      - name: Run E2E tests (Deno)
        run: deno run --allow-read --allow-ffi --allow-env test/e2e/e2e.deno.ts

      - name: Stage npm package files
        run: |
          cp zig-out/lib/libpict.so npm/zigpix-linux-x64/
          cp LICENSE THIRD_PARTY_LICENSES npm/zigpix-linux-x64/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: libpict-linux-x64
          path: npm/zigpix-linux-x64/

  # ── macOS arm64 (Apple Silicon) ───────────────────────────────────────────
  build-darwin-arm64:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Zig 0.13.0
        uses: mlugg/setup-zig@v1
        with:
          version: 0.13.0

      - name: Install build tools (cmake)
        # arm64 では nasm 不要（libaom は NASM なしでビルド可能）
        run: brew install cmake ninja

      - name: Build libavif (static) — libaom via FetchContent
        run: |
          mkdir -p build/libavif && cd build/libavif
          cmake ../../vendor/libavif -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=../../build/libavif-install \
            -DAVIF_CODEC_AOM=LOCAL \
            -DAVIF_CODEC_DAV1D=OFF \
            -DAVIF_BUILD_TESTS=OFF \
            -DAVIF_BUILD_APPS=OFF \
            -DAVIF_LIBYUV=OFF \
            -DBUILD_SHARED_LIBS=OFF
          ninja
          ninja install

      - name: Build libpict.dylib (static avif)
        run: zig build lib -Doptimize=ReleaseFast -Davif=static

      - name: Verify libavif/libaom not dynamically linked
        run: |
          echo "=== otool -L output ===" && otool -L zig-out/lib/libpict.dylib
          ! otool -L zig-out/lib/libpict.dylib | grep -E "libavif|libaom"

      - name: Install Node.js deps
        run: npm install

      - name: Build JS wrapper (js/dist/)
        run: npm run build

      - name: Overlay zig-out lib for tests (optional npm bins are stale until publish)
        run: |
          mkdir -p node_modules/zigpix-darwin-arm64
          cp npm/zigpix-darwin-arm64/package.json node_modules/zigpix-darwin-arm64/
          cp zig-out/lib/libpict.dylib node_modules/zigpix-darwin-arm64/libpict.dylib

      - name: Run FFI tests (Bun)
        uses: oven-sh/setup-bun@v2
      - run: bun run test/ffi/test.ts

      - name: Run FFI tests (Node.js / koffi)
        run: npx tsx test/ffi/test.node.ts

      - name: Install Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Run FFI tests (Deno)
        run: deno run --allow-read --allow-ffi --allow-env test/ffi/test.deno.ts

      - name: Run E2E tests (Node.js)
        run: npx tsx test/e2e/e2e.node.ts

      - name: Run E2E tests (Bun)
        run: bun run test/e2e/e2e.node.ts

      - name: Run E2E tests (Deno)
        run: deno run --allow-read --allow-ffi --allow-env test/e2e/e2e.deno.ts

      - name: Stage npm package files
        run: |
          cp zig-out/lib/libpict.dylib npm/zigpix-darwin-arm64/
          cp LICENSE THIRD_PARTY_LICENSES npm/zigpix-darwin-arm64/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: libpict-darwin-arm64
          path: npm/zigpix-darwin-arm64/

  # ── Windows x64 (MSVC) ────────────────────────────────────────────────────
  build-windows-x64:
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Enable MSVC + Windows SDK (x64)
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install Zig 0.13.0
        uses: mlugg/setup-zig@v1
        with:
          version: 0.13.0

      - name: Install Ninja and NASM
        run: choco install ninja nasm -y --no-progress

      - name: Add NASM to PATH
        run: echo "/c/Program Files/NASM" >> "$GITHUB_PATH"

      - name: Build libavif (static) — libaom via FetchContent
        run: |
          mkdir -p build/libavif && cd build/libavif
          cmake ../../vendor/libavif -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreadedDLL \
            -DCMAKE_INSTALL_PREFIX=../../build/libavif-install \
            -DAVIF_CODEC_AOM=LOCAL \
            -DAVIF_CODEC_DAV1D=OFF \
            -DAVIF_BUILD_TESTS=OFF \
            -DAVIF_BUILD_APPS=OFF \
            -DAVIF_LIBYUV=OFF \
            -DBUILD_SHARED_LIBS=OFF
          ninja
          ninja install

      - name: Build libpict.dll (static avif)
        run: zig build lib-windows -Doptimize=ReleaseFast -Davif=static

      - name: Verify libpict.dll (dumpbin exports + no avif/aom DLL deps)
        run: bash scripts/ci-verify-libpict-windows.sh

      - name: List static libaom outputs (debug)
        if: failure()
        run: ls -la build/libavif/_deps/libaom-build/ || true

      - name: Install Node.js deps
        run: npm install

      - name: Build JS wrapper (js/dist/)
        run: npm run build

      - name: Overlay zig-out DLL for tests
        run: |
          mkdir -p node_modules/zigpix-win32-x64
          cp npm/zigpix-win32-x64/package.json node_modules/zigpix-win32-x64/
          cp zig-out/windows-x86_64/libpict.dll node_modules/zigpix-win32-x64/libpict.dll

      - name: Run FFI tests (Bun)
        uses: oven-sh/setup-bun@v2
      - run: bun run test/ffi/test.ts

      - name: Run FFI tests (Node.js / koffi)
        run: npx tsx test/ffi/test.node.ts

      - name: Install Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Run FFI tests (Deno)
        run: deno run --allow-read --allow-ffi --allow-env test/ffi/test.deno.ts

      - name: Run E2E tests (Node.js)
        run: npx tsx test/e2e/e2e.node.ts

      - name: Run E2E tests (Bun)
        run: bun run test/e2e/e2e.node.ts

      - name: Run E2E tests (Deno)
        run: deno run --allow-read --allow-ffi --allow-env test/e2e/e2e.deno.ts

      - name: Stage npm package files
        run: |
          cp zig-out/windows-x86_64/libpict.dll npm/zigpix-win32-x64/
          cp LICENSE THIRD_PARTY_LICENSES npm/zigpix-win32-x64/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: libpict-win32-x64
          path: npm/zigpix-win32-x64/

  # ── Windows ARM64 (MSVC, ネイティブ) ─────────────────────────────────────
  # GitHub Hosted: runs-on: windows-11-arm（公開リポ向け）。キュー遅延時は再実行で対応。
  build-windows-arm64:
    runs-on: windows-11-arm
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Enable MSVC + Windows SDK (ARM64)
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: arm64

      # libavif は **Visual Studio 17 2022 + -A ARM64** でビルド（Ninja+MSVC だと x64 .lib になりやすい）。
      # ビルドツリーは **build/libavif** のまま（build.zig の `build/libavif/_deps/.../aom.lib` と整合）。
      - name: Build libavif (static) — libaom via FetchContent (VS ARM64)
        run: |
          rm -rf build/libavif-install build/libavif
          mkdir -p build/libavif && cd build/libavif
          cmake ../../vendor/libavif \
            -G "Visual Studio 17 2022" \
            -A ARM64 \
            -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreadedDLL \
            -DCMAKE_INSTALL_PREFIX=../../build/libavif-install \
            -DAVIF_CODEC_AOM=LOCAL \
            -DAVIF_CODEC_DAV1D=OFF \
            -DAVIF_BUILD_TESTS=OFF \
            -DAVIF_BUILD_APPS=OFF \
            -DAVIF_LIBYUV=OFF \
            -DBUILD_SHARED_LIBS=OFF
          cmake --build . --config Release --parallel
          cmake --build . --config Release --target install

      - name: Flatten avif.lib / aom.lib paths for Zig (VS multi-config)
        run: bash scripts/ci-normalize-libavif-msvc-libs.sh

      - name: Install Zig 0.13.0
        uses: mlugg/setup-zig@v1
        with:
          version: 0.13.0

      - name: Build libpict.dll (static avif, aarch64)
        run: zig build lib-windows-arm64 -Doptimize=ReleaseFast -Davif=static

      - name: Verify libpict.dll PE machine (expect ARM64 / 0xAA64)
        run: llvm-readobj --file-headers zig-out/windows-aarch64/libpict.dll | grep -i machine

      - name: Verify libpict.dll (exports + no avif/aom DLL deps)
        run: bash scripts/ci-verify-libpict-windows.sh zig-out/windows-aarch64/libpict.dll

      - name: List static libaom outputs (debug)
        if: failure()
        run: ls -la build/libavif/_deps/libaom-build/ || true

      # windows-11-arm では PROCESSOR_ARCHITECTURE / process.arch が x64 を返すことがある
      # （actions/partner-runner-images#117）。ネイティブ arm64 Node + koffi で aarch64 DLL をロードする。
      - name: Setup Node.js (arm64)
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          architecture: arm64

      - name: Install Node.js deps
        run: npm install

      - name: Build JS wrapper (js/dist/)
        run: npm run build

      - name: Overlay zig-out DLL for tests
        run: |
          mkdir -p node_modules/zigpix-win32-arm64
          cp npm/zigpix-win32-arm64/package.json node_modules/zigpix-win32-arm64/
          cp zig-out/windows-aarch64/libpict.dll node_modules/zigpix-win32-arm64/libpict.dll

      - name: Log Node arch (WoA CI sanity)
        run: node -p "[process.arch, process.platform, process.execPath].join(' ')"

      # koffi は 2.8 台以降で Windows の load / GetLastError / SEHOP 周りが継続改善。古い 2.9 系で
      # 「Failed to load … The operation completed successfully」だけ出る場合は依存解決や
      # エラー伝播の不具合の可能性があるため、ルート package.json の koffi は ^2.16 を前提にする。
      #
      # hostedtoolcache の Python arm64 は **ARM64EC** のことがあり、**純 ARM64（0xAA64）** の DLL を
      # ctypes で読むと WinError 193 になる。ロード検証は **Zig が生成する同ターゲットのネイティブ exe**
      #（`zig build-exe`）で行う（scripts/verify_win_dll_load.zig）。
      #
      # `-target aarch64-windows-msvc` は Zig 0.13.0 + MSVC ツールチェーンの組み合わせで
      # ARM64EC（0xA641）になることがある。ARM64EC プロセスは純 ARM64 DLL を LoadLibrary
      # できないため 193 になる。`aarch64-windows-gnu` は Zig 同梱 MinGW を使い
      # 確実に純 ARM64（0xAA64）の exe を生成する。
      - name: Build DLL loader exe (pure ARM64 / aarch64-windows-gnu)
        run: |
          zig build-exe -target aarch64-windows-gnu -O ReleaseSafe \
            scripts/verify_win_dll_load.zig -femit-bin=verify_win_dll_load.exe
          echo "=== loader exe machine ===" && llvm-readobj --file-headers verify_win_dll_load.exe | grep -i machine
          echo "=== libpict.dll machine ===" && llvm-readobj --file-headers zig-out/windows-aarch64/libpict.dll | grep -i machine
          echo "=== libpict.dll imports ===" && llvm-readobj --coff-imports zig-out/windows-aarch64/libpict.dll | grep -i "^Import\|Name:" || true

      # vcruntime140.dll (ARM64) の確実な提供:
      #   vc_redist インストーラは System32 書き込みが失敗することがある（権限・既存 x64 版の混在等）。
      #   確実な方法は VCToolsRedistDir の arm64\Microsoft.VC143.CRT から直接コピーすること。
      #
      #   LoadLibrary の依存 DLL 探索順序（Windows 標準）:
      #     1. アプリ（node.exe）のディレクトリ  ← 最優先・最も確実
      #     2. System32
      #     3. Windows ディレクトリ
      #     4. CWD
      #     5. PATH
      #   koffi は LOAD_WITH_ALTERED_SEARCH_PATH を使わないため、DLL 自身のディレクトリは
      #   検索されない。node.exe のディレクトリに置くのが唯一確実な方法。
      - name: Stage ARM64 CRT (vcruntime140.dll → node dir + DLL dir + CWD)
        shell: pwsh
        run: |
          $crt = Join-Path $env:VCToolsRedistDir "arm64\Microsoft.VC143.CRT"
          if (-not (Test-Path $crt)) {
            Write-Error "ARM64 CRT not found: $crt"
            exit 1
          }
          Write-Host "ARM64 CRT dir: $crt"
          # 1. node.exe のディレクトリ（LoadLibrary 探索 #1: アプリディレクトリ）← 最も確実
          $nodeDir = Split-Path (Get-Command node.exe).Source -Parent
          Write-Host "node.exe dir: $nodeDir"
          Copy-Item "$crt\*.dll" $nodeDir -Force
          # 2. LOAD_WITH_ALTERED_SEARCH_PATH 用: DLL 自身のディレクトリ（verify ステップ用）
          Copy-Item "$crt\*.dll" zig-out\windows-aarch64\ -Force
          # 3. CWD (repo root): LoadLibrary 探索 #4 として念のため
          Copy-Item "$crt\*.dll" . -Force
          Write-Host "Staged. vcruntime DLLs:"
          Get-ChildItem $nodeDir -Filter "vcruntime*.dll" | Format-Table Name, Length

      - name: Verify libpict.dll loads (Zig LoadLibraryW; not Python ctypes on WoA)
        continue-on-error: true
        run: ./verify_win_dll_load.exe zig-out/windows-aarch64/libpict.dll

      # node.exe / koffi のアーキテクチャと LoadLibraryW 挙動を診断する。
      # error 0 が続く場合: node.exe が ARM64EC（0xA641）のため純 ARM64（0xAA64）DLL を
      # ロードできない可能性がある。ARM64EC プロセスは純 ARM64 DLL を LoadLibrary できない。
      - name: Diagnose node.exe arch and DLL load (llvm-readobj + pwsh)
        continue-on-error: true
        shell: bash
        run: |
          echo "=== node.exe machine type ==="
          NODE_BIN=$(which node)
          echo "node.exe path: $NODE_BIN"
          llvm-readobj --file-headers "$NODE_BIN" | grep -i machine || true

          echo "=== vcruntime140.dll in node dir ==="
          NODE_DIR=$(dirname "$NODE_BIN")
          VCR="$NODE_DIR/vcruntime140.dll"
          if [ -f "$VCR" ]; then
            llvm-readobj --file-headers "$VCR" | grep -i machine || true
          else
            echo "NOT FOUND: $VCR"
          fi

          echo "=== libpict.dll imports ==="
          llvm-readobj --coff-imports zig-out/windows-aarch64/libpict.dll | grep -i "Name:" || true

      - name: Diagnose LoadLibraryW via PowerShell P/Invoke
        continue-on-error: true
        shell: pwsh
        run: |
          $src = 'using System; using System.Runtime.InteropServices;'
          $src += 'public class WinDll {'
          $src += '[DllImport("kernel32.dll",SetLastError=true,CharSet=CharSet.Unicode)] public static extern IntPtr LoadLibraryW(string s);'
          $src += '[DllImport("kernel32.dll",SetLastError=true,CharSet=CharSet.Unicode)] public static extern IntPtr LoadLibraryExW(string s,IntPtr h,uint f);'
          $src += '[DllImport("kernel32.dll")] public static extern uint GetLastError();'
          $src += '}'
          Add-Type -TypeDefinition $src
          $abs = (Resolve-Path "zig-out\windows-aarch64\libpict.dll").Path
          Write-Host "Testing LoadLibraryW on: $abs"
          $h = [WinDll]::LoadLibraryW($abs)
          Write-Host ("LoadLibraryW  -> 0x{0:X}  GetLastError={1}" -f $h.ToInt64(), [WinDll]::GetLastError())
          Write-Host "Testing LoadLibraryExW(LOAD_WITH_ALTERED_SEARCH_PATH=0x8)"
          $h2 = [WinDll]::LoadLibraryExW($abs, [IntPtr]::Zero, 0x8)
          Write-Host ("LoadLibraryExW-> 0x{0:X}  GetLastError={1}" -f $h2.ToInt64(), [WinDll]::GetLastError())

      # Bun Windows ARM64 は現状 bun:ffi（dlopen）が無効 —「TinyCC is disabled」。
      # FFI は Node（koffi）+ Deno で網羅。Bun が WoA で FFI 対応したらこのジョブに戻す。
      - name: Run FFI tests (Bun) — skipped on Windows ARM64
        run: echo "::notice title=Bun FFI::Skipped on windows-11-arm (bun:ffi dlopen unavailable); Node + Deno run below."

      - name: Run FFI tests (Node.js / koffi)
        run: npx tsx test/ffi/test.node.ts

      - name: Install Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Run FFI tests (Deno)
        run: deno run --allow-read --allow-ffi --allow-env test/ffi/test.deno.ts

      - name: Run E2E tests (Node.js)
        run: npx tsx test/e2e/e2e.node.ts

      - name: Run E2E tests (Bun) — skipped on Windows ARM64
        run: echo "::notice title=Bun E2E::Skipped on windows-11-arm (same as FFI)."

      - name: Run E2E tests (Deno)
        run: deno run --allow-read --allow-ffi --allow-env test/e2e/e2e.deno.ts

      - name: Stage npm package files
        run: |
          cp zig-out/windows-aarch64/libpict.dll npm/zigpix-win32-arm64/
          cp LICENSE THIRD_PARTY_LICENSES npm/zigpix-win32-arm64/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: libpict-win32-arm64
          path: npm/zigpix-win32-arm64/
